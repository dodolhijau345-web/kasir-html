<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#007bff">
<title>Kasir Laundry Paul IT</title>
<link rel="manifest" href="manifest.json">
<style>
  body { font-family: Arial; background: #f2f2f2; padding: 10px; margin:0; }
 .box { background: white; padding: 15px; border-radius: 10px; max-width: 700px; margin: auto; }
  h2 { text-align: center; color: #007bff; margin-bottom: 5px; }
 .info-nota { display:flex; justify-content:space-between; font-size:12px; margin-bottom:10px; border-bottom:1px dashed #ccc; padding-bottom:10px; }
 .grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
 .form-input label { display:block; font-weight:bold; margin-top:10px; font-size:14px; }
 .form-input select,.form-input input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing:border-box; }
 .form-input input[readonly] { background:#e9ecef; }
 .btn { border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; width:100%; margin-top:10px; font-size:16px; color:white; }
 .btn-tambah { background: #28a745; }
 .btn-reset { background: #6c757d; }
 .btn-cetak { background: #ffc107; color:black; }
 .btn-wa { background: #25D366; }
 .btn-ganti { background: #6c757d; font-size:14px; padding:8px; }
  table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size:13px; }
  th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
  th { background: #007bff; color: white; }
  td:nth-child(2) { text-align: left; }
 .btn-hapus { background: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; }
 .total-box { background: #e7f3ff; padding: 15px; border-radius: 8px; margin-top: 15px; }
 .total { font-size: 28px; color: #dc3545; font-weight: bold; text-align:right; }
 .bayar-box input { width:100%; padding:10px; margin-top:5px; box-sizing:border-box; }
 .kembalian { font-size: 20px; color: #28a745; font-weight: bold; text-align:right; margin-top:5px; }
 .lock-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:#007bff; color:white; display:flex; justify-content:center; align-items:center; z-index:9999; }
 .lock-box { background:white; color:black; padding:30px; border-radius:10px; text-align:center; width:90%; max-width:400px; }
 .lock-box input { width:100%; padding:12px; margin:10px 0; box-sizing:border-box; font-size:18px; text-align:center; }
  @media print { body { background: white; }.btn,.lock-screen,.form-input { display: none; }.box { box-shadow: none; } }
</style>
</head>
<body>

<div id="lockScreen" class="lock-screen">
  <div class="lock-box">
    <h3>🔒 KASIR LAUNDRY PAUL IT</h3>
    <input type="text" id="kodeInput" placeholder="Masukkan Kode Aktivasi">
    <button class="btn btn-tambah" onclick="cekKode()">AKTIVASI</button>
    <p style="font-size:12px; color:red;" id="pesanError"></p>
  </div>
</div>

<div class="box" id="mainApp" style="display:none;">
  <h2>🧺 KASIR LAUNDRY PAUL IT</h2>
  <div class="info-nota">
    <span><b>No Nota:</b> <span id="noNotaView"></span></span>
    <span><b>Tanggal:</b> <span id="tanggal"></span></span>
  </div>

  <div class="grid">
    <div class="form-input">
      <label>Jenis Pembayaran</label>
      <select id="jenisBayar">
        <option value="TUNAI">TUNAI</option>
        <option value="KREDIT">KREDIT / BON</option>
      </select>
    </div>
    <div class="form-input">
      <label>No Nota</label>
      <input type="text" id="noNota" readonly>
    </div>
    <div class="form-input">
      <label>Jenis Layanan</label>
      <select id="jenisLayanan" onchange="setHarga()">
        <option value="7000">Cuci Kiloan - Rp 7.000/Kg</option>
        <option value="4000">Cuci Satuan - Rp 4.000/Pcs</option>
        <option value="2000">Setrika - Rp 2.000/Pcs</option>
      </select>
    </div>
    <div class="form-input"><label>Berat / Qty</label><input type="number" step="0.1" id="qtyBarang" value="1" autofocus></div>
    <div class="form-input" style="grid-column: span 2;"><label>Harga Satuan</label><input type="number" id="hargaBarang" value="7000" readonly></div>
  </div>
  <button class="btn btn-tambah" onclick="tambahBarang()">+ TAMBAH KE NOTA</button>
  <table id="tabel"><tr><th>No</th><th>Layanan</th><th>Berat/Qty</th><th>Harga</th><th>Jumlah</th><th></th></tr></table>

  <div class="total-box">
    <h3>TOTAL BAYAR</h3>
    <div class="total">Rp <span id="total">0</span></div>
    <div id="boxTunai">
      <label>Uang Bayar</label>
      <div class="bayar-box"><input type="number" id="uangBayar" oninput="hitungKembalian()"></div>
      <div>Kembalian: <span class="kembalian">Rp <span id="kembalian">0</span></span></div>
    </div>
    <div id="boxKredit" style="display:none; color:#dc3545; font-weight:bold; margin-top:10px;">
      STATUS: PIUTANG / BELUM BAYAR
    </div>
  </div>

  <button class="btn btn-reset" onclick="reset()">RESET TRANSAKSI</button>
  <button class="btn btn-cetak" onclick="cetakStruk()">🖨️ CETAK STRUK</button>
  <button class="btn btn-wa" onclick="kirimWA()">📲 KIRIM KE WA</button>
  <button class="btn btn-ganti" onclick="gantiLisensi()">🔑 GANTI KODE LISENSI</button>
</div>

<script>
const DAFTAR_KODE = ["PAUL-001", "PAUL-002", "PAUL-003", "DEMO-123"];
let data = JSON.parse(localStorage.getItem('kasirLaundry')) || [];

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

document.getElementById('jenisBayar').addEventListener('change', function(){
  if(this.value == 'KREDIT'){
    document.getElementById('boxTunai').style.display = 'none';
    document.getElementById('boxKredit').style.display = 'block';
  } else {
    document.getElementById('boxTunai').style.display = 'block';
    document.getElementById('boxKredit').style.display = 'none';
  }
});

function cekAktivasi(){
  if(localStorage.getItem('lisensiAktif') === 'true'){
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    buatNoNota();
    tampilkanTanggal();
    tampilkan();
    document.getElementById('qtyBarang').focus(); // langsung ke berat
  } else {
    document.getElementById('lockScreen').style.display = 'flex';
  }
}
function cekKode(){
  let kode = document.getElementById('kodeInput').value.toUpperCase().trim();
  if(DAFTAR_KODE.includes(kode)){
    localStorage.setItem('lisensiAktif', 'true');
    localStorage.setItem('kodeDipakai', kode);
    cekAktivasi();
  } else {
    document.getElementById('pesanError').innerText = 'Kode Salah!';
  }
}
function buatNoNota(){
  let now = new Date();
  let tanggal = now.getFullYear().toString() +
                String(now.getMonth()+1).padStart(2,'0') +
                String(now.getDate()).padStart(2,'0');

  let keyUrut = 'noUrut_' + tanggal;
  let urut = localStorage.getItem(keyUrut) || 1;

  let no = 'PAUL' + tanggal + '-' + String(urut).padStart(3,'0');
  document.getElementById('noNota').value = no;
  document.getElementById('noNotaView').innerText = no;

  localStorage.setItem(keyUrut, parseInt(urut) + 1);
}
function tampilkanTanggal(){
  let now = new Date();
  let tgl = now.toLocaleDateString('id-ID');
  let jam = now.toLocaleTimeString('id-ID');
  document.getElementById('tanggal').innerText = tgl + '' + jam;
}
function setHarga(){
  document.getElementById('hargaBarang').value = document.getElementById('jenisLayanan').value;
}
function tambahBarang(){
  let jenisBayar = document.getElementById('jenisBayar').value;
  let noNota = document.getElementById('noNota').value;
  let layanan = document.getElementById('jenisLayanan').options[document.getElementById('jenisLayanan').selectedIndex].text;
  let qty = parseFloat(document.getElementById('qtyBarang').value) || 1;
  let harga = parseInt(document.getElementById('hargaBarang').value);
  let jumlah = qty * harga;
  data.push({noNota: noNota, jenisBayar: jenisBayar, layanan: layanan, qty: qty, harga: harga, jumlah: jumlah});
  localStorage.setItem('kasirLaundry', JSON.stringify(data));

  // CUKUP RESET QTY DOANG
  document.getElementById('qtyBarang').value = '1';
  document.getElementById('qtyBarang').focus(); // balik ke berat lagi

  tampilkan();
}
function hapus(index){ data.splice(index, 1); localStorage.setItem('kasirLaundry', JSON.stringify(data)); tampilkan(); }
function tampilkan(){
  let tabel = document.getElementById('tabel'); let total = 0;
  tabel.innerHTML = '<tr><th>No</th><th>Layanan</th><th>Berat/Qty</th><th>Harga</th><th>Jumlah</th><th></th></tr>';
  data.forEach((d, i) => {
    total += d.jumlah;
    tabel.innerHTML += `<tr><td>${i+1}</td><td>${d.layanan} <br><small>[${d.jenisBayar}]</small></td><td>${d.qty}</td><td>Rp ${d.harga.toLocaleString('id-ID')}</td><td>Rp ${d.jumlah.toLocaleString('id-ID')}</td><td><button class="btn-hapus" onclick="hapus(${i})">X</button></td></tr>`;
  });
  document.getElementById('total').innerText = total.toLocaleString('id-ID');
  hitungKembalian();
}
function hitungKembalian(){
  let total = data.reduce((sum, d) => sum + d.jumlah, 0);
  let bayar = parseInt(document.getElementById('uangBayar').value) || 0;
  document.getElementById('kembalian').innerText = (bayar - total).toLocaleString('id-ID');
}
function reset(){
  if(confirm('Mulai transaksi baru?')){
    data = [];
    localStorage.removeItem('kasirLaundry');
    document.getElementById('uangBayar').value = '';
    buatNoNota();
    tampilkanTanggal();
    tampilkan();
  }
}
function gantiLisensi(){
  if(confirm('Yakin mau ganti kode lisensi?')){
    localStorage.removeItem('lisensiAktif');
    location.reload();
  }
}
function cetakStruk(){ window.print(); }
function kirimWA(){
  let jenisBayar = document.getElementById('jenisBayar').value;
  let noNota = document.getElementById('noNota').value;
  let total = document.getElementById('total').innerText;
  let pesan = `*NOTA LAUNDRY PAUL IT*%0A`;
  pesan += `No: ${noNota}%0A`;
  pesan += `Tgl: ${document.getElementById('tanggal').innerText}%0A`;
  pesan += `Bayar: ${jenisBayar}%0A%0A`;
  data.forEach((d,i)=>{ pesan += `${i+1}. ${d.layanan} ${d.qty} = Rp ${d.jumlah.toLocaleString('id-ID')}%0A` });
  pesan += `%0A*TOTAL: Rp ${total}*`;
  if(jenisBayar == 'KREDIT'){ pesan += `%0A*STATUS: PIUTANG*` }
  pesan += `%0A%0ATerima kasih`;
  window.open(`https://wa.me/?text=${pesan}`);
}

cekAktivasi();
</script>
</body>
</html>
