<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#007bff">
<meta name="mobile-web-app-capable" content="yes">
<title>VERSI - 20</title>
<link rel="manifest" href="manifest-paul.json">
<link rel="apple-touch-icon" href="android-chrome-192x192.png">
<style>
  body { font-family: Arial; background: #f2f2f2; padding: 10px; margin:0; }
 .box { background: white; padding: 15px; border-radius: 5px; max-width: 600px; margin: auto; border:1px solid #ccc; }
  h2 { text-align: center; margin-bottom: 15px; }
 .row { display:flex; gap:10px; margin-bottom:10px; align-items:center; }
 .row label { width:120px; border:1px solid #000; padding:8px; text-align:center; font-weight:bold; background:#eee; }
 .row input,.row select { flex:1; padding: 8px; border: 1px solid #000; font-size: 16px; }
 .grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin:10px 0; }
 .btn { border: 1px solid #000; padding: 10px; font-weight: bold; cursor: pointer; width:100%; font-size:15px; }
 .btn-tunai { background: #28a745; color:white; }
 .btn-kredit { background: #dc3545; color:white; }
 .btn-cetak { background: #ffc107; }
 .btn-wa { background: #25D366; color:white; }
 .btn-simpan { background: #007bff; color:white; grid-column: span 2; }
 .btn-lisensi { background: #6c757d; color:white; }
 .btn-proses { background: #ffc107; font-size:12px; padding:4px; }
 .btn-selesai { background: #28a745; color:white; font-size:12px; padding:4px; }
  table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size:13px; border:1px solid #000; }
  th, td { border: 1px solid #000; padding: 6px; text-align: center; }
  th { background: #eee; }
 .status-proses { color: #ffc107; font-weight:bold; }
 .status-selesai { color: #28a745; font-weight:bold; }
 .rekap h3 { text-align:center; }
 .total-box { text-align:right; margin-top:5px; font-size:15px; }
 .total-box span { font-weight:bold; }
 .grand { font-size:18px; color:#007bff; border-top:2px solid #000; padding-top:5px; }
 .lock-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:#007bff; display:flex; justify-content:center; align-items:center; z-index:9999; }
 .lock-box { background:white; padding:30px; border-radius:10px; text-align:center; width:90%; }
 .lock-box input { width:100%; padding:12px; margin:10px 0; font-size:18px; text-align:center; }
  @media print { body{background:white;}.box{border:none;}.btn,.lock-screen{display:none!important;} }
</style>
</head>
<body>

<div id="lockScreen" class="lock-screen">
  <div class="lock-box">
    <h3>🔒 VERSI - 20</h3>
    <input type="text" id="kodeInput" placeholder="Masukkan Kode">
    <button class="btn btn-tunai" onclick="cekKode()">AKTIVASI</button>
    <p style="color:red;" id="pesanError"></p>
  </div>
</div>

<div class="box" id="mainApp" style="display:none;">
  <h2>VERSI - 20</h2>

  <div class="row"><label>NAMA</label><input type="text" id="nama"></div>
  <div class="row"><label>TGL MASUK</label><input type="date" id="tglMasuk"></div>
  <div class="row"><label>TGL SELESAI</label><input type="date" id="tglSelesai"></div>
  <div class="row"><label>LAYANAN</label>
    <select id="layanan" onchange="setHarga()">
      <option value="7000">CUCI KILOAN</option>
      <option value="4000">CUCI SATUAN</option>
      <option value="2000">SETRIKA</option>
    </select>
  </div>
  <div class="row"><label>HARGA</label><input type="number" id="harga" value="7000" readonly></div>
  <div class="row"><label>QTY</label><input type="number" id="qty" value="1"></div>
  <div class="row"><label>TOTAL BAYAR</label><input type="number" id="totalBayar" readonly></div>
  <div class="row"><label>NO ANTRIAN</label><input type="text" id="noAntrian" readonly></div>

  <div class="grid-2">
    <button class="btn btn-tunai" onclick="pilihBayar('TUNAI')">TUNAI</button>
    <button class="btn btn-kredit" onclick="pilihBayar('KREDIT')">KREDIT</button>
  </div>
  <div class="grid-2">
    <button class="btn btn-cetak" onclick="cetakStruk()">CETAK STRUK</button>
    <button class="btn btn-wa" onclick="kirimWA()">WA</button>
  </div>
  <div class="grid-2">
    <button class="btn btn-simpan" onclick="simpanNotaBaru()">SIMPAN / NOTA BARU</button>
    <button class="btn btn-lisensi" onclick="gantiLisensi()">GANTI LISENSI</button>
  </div>

  <table id="tabelProses">
    <tr><th>NO ANTRIAN</th><th>PROSES</th><th>SELESAI</th><th>STATUS</th></tr>
  </table>

  <div class="rekap">
    <h3>Rekap Penjualan</h3>
    <table id="tabelRekap">
      <tr><th>NO ANTRIAN</th><th>TUNAI</th><th>KREDIT</th></tr>
    </table>

    <div class="total-box">TOTAL TUNAI : Rp <span id="totalTunai">0</span></div>
    <div class="total-box">TOTAL KREDIT : Rp <span id="totalKredit">0</span></div>
    <div class="total-box grand">GRAND TOTAL : Rp <span id="grandTotal">0</span></div>

    <button class="btn btn-kredit" onclick="resetRekap()">RESET REKAP</button>
  </div>
</div>

<script>
const DAFTAR_KODE = ["PAUL-001", "PAUL-002", "PAUL-003"];
let dataRekap = JSON.parse(localStorage.getItem('kasirRekap20')) || [];
let dataProses = JSON.parse(localStorage.getItem('kasirProses20')) || [];
let statusBayar = 'TUNAI';
let noUrut = parseInt(localStorage.getItem('noUrut20')) || 1;

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw-paul.js');
}

document.getElementById('qty').oninput = hitungTotal;
document.getElementById('layanan').onchange = hitungTotal;

function cekAktivasi(){
  if(localStorage.getItem('lisensiAktif20') === 'true'){
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('noAntrian').value = 'A' + noUrut;
    tampilkanRekap();
    tampilkanProses();
  } else {
    document.getElementById('lockScreen').style.display = 'flex';
  }
}
function cekKode(){
  let kode = document.getElementById('kodeInput').value.toUpperCase().trim();
  if(DAFTAR_KODE.includes(kode)){
    localStorage.setItem('lisensiAktif20', 'true');
    cekAktivasi();
  } else {
    document.getElementById('pesanError').innerText = 'Kode Salah!';
  }
}
function gantiLisensi(){
  localStorage.removeItem('lisensiAktif20');
  location.reload();
}
function setHarga(){
  document.getElementById('harga').value = document.getElementById('layanan').value;
}
function hitungTotal(){
  let qty = parseInt(document.getElementById('qty').value) || 0;
  let harga = parseInt(document.getElementById('harga').value) || 0;
  document.getElementById('totalBayar').value = qty * harga;
}
function pilihBayar(status){ statusBayar = status; alert('Status: ' + status); }

function simpanNotaBaru(){
  let data = {
    noAntrian: document.getElementById('noAntrian').value,
    nama: document.getElementById('nama').value,
    tunai: statusBayar === 'TUNAI'? document.getElementById('totalBayar').value : 0,
    kredit: statusBayar === 'KREDIT'? document.getElementById('totalBayar').value : 0,
    status: 'PROSES'
  };
  dataRekap.push(data);
  dataProses.push({noAntrian: data.noAntrian, status: 'PROSES'});
  localStorage.setItem('kasirRekap20', JSON.stringify(dataRekap));
  localStorage.setItem('kasirProses20', JSON.stringify(dataProses));
  localStorage.setItem('noUrut20', noUrut + 1);
  noUrut++;
  tampilkanRekap();
  tampilkanProses();
  document.getElementById('noAntrian').value = 'A' + noUrut;
  document.getElementById('nama').value = '';
}

function setStatus(index, statusBaru){
  dataProses[index].status = statusBaru;
  localStorage.setItem('kasirProses20', JSON.stringify(dataProses));
  tampilkanProses();
}

function tampilkanRekap(){
  let tabel = document.getElementById('tabelRekap');
  let totalT = 0; // total tunai
  let totalK = 0; // total kredit

  tabel.innerHTML = '<tr><th>NO ANTRIAN</th><th>TUNAI</th><th>KREDIT</th></tr>';
  dataRekap.forEach((d) => {
    let t = parseInt(d.tunai)||0;
    let k = parseInt(d.kredit)||0;
    totalT += t;
    totalK += k;
    tabel.innerHTML += `<tr><td>${d.noAntrian}</td><td>Rp ${t.toLocaleString('id-ID')}</td><td>Rp ${k.toLocaleString('id-ID')}</td></tr>`;
  });

  let grand = totalT + totalK;
  document.getElementById('totalTunai').innerText = totalT.toLocaleString('id-ID');
  document.getElementById('totalKredit').innerText = totalK.toLocaleString('id-ID');
  document.getElementById('grandTotal').innerText = grand.toLocaleString('id-ID');
}

function tampilkanProses(){
  let tabel = document.getElementById('tabelProses');
  tabel.innerHTML = '<tr><th>NO ANTRIAN</th><th>PROSES</th><th>SELESAI</th><th>STATUS</th></tr>';
  dataProses.forEach((d, i) => {
    let statusClass = d.status === 'PROSES'? 'status-proses' : 'status-selesai';
    tabel.innerHTML += `
    <tr>
      <td>${d.noAntrian}</td>
      <td><button class="btn-proses" onclick="setStatus(${i},'PROSES')">PROSES</button></td>
      <td><button class="btn-selesai" onclick="setStatus(${i},'SELESAI')">SELESAI</button></td>
      <td class="${statusClass}">${d.status}</td>
    </tr>`;
  });
}

function resetRekap(){
  if(confirm('Hapus semua rekap?')){
    dataRekap = [];
    dataProses = [];
    localStorage.removeItem('kasirRekap20');
    localStorage.removeItem('kasirProses20');
    tampilkanRekap();
    tampilkanProses();
  }
}
function cetakStruk(){ window.print(); }
function kirimWA(){
  let pesan = `*PAUL LONDRY V20*%0ANo: ${document.getElementById('noAntrian').value}%0ANama: ${document.getElementById('nama').value}%0ATotal: Rp ${document.getElementById('totalBayar').value}`;
  window.open(`https://wa.me/?text=${pesan}`);
}
cekAktivasi();
</script>
</body>
</html>
