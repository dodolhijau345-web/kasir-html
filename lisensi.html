<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#dc3545">
<title>Kasir Warung Madura PRO</title>
<link rel="manifest" href="manifest.json">
<style>
  body { font-family: Arial; background: #f2f2f2; padding: 10px; margin:0; }
.box { background: white; padding: 15px; border-radius: 10px; max-width: 600px; margin: auto; }
  h2 { text-align: center; color: #dc3545; margin-bottom: 5px; }
.install-btn { background:#007bff; color:white; border:none; padding:12px; border-radius:5px; width:100%; margin-bottom:15px; display:none; font-weight:bold; }
.form-input label { display:block; font-weight:bold; margin-top:10px; margin-bottom:5px; font-size:14px; }
.form-input input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing:border-box; }
.btn-tambah { background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; width:100%; margin-top:15px; font-size:16px; }
  table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size:13px; }
  th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
  th { background: #007bff; color: white; }
  td:nth-child(2) { text-align: left; }
.btn-hapus { background: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; }
.total-box { background: #e7f3ff; padding: 15px; border-radius: 8px; margin-top: 15px; }
.total { font-size: 26px; color: #dc3545; font-weight: bold; text-align:right; }
.bayar-box input { width:100%; padding:10px; margin-top:5px; box-sizing:border-box; }
.kembalian { font-size: 20px; color: #28a745; font-weight: bold; text-align:right; margin-top:5px; }

 /* LAYAR KUNCI */
.lock-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:#dc3545; color:white; display:flex; justify-content:center; align-items:center; z-index:9999; }
.lock-box { background:white; color:black; padding:30px; border-radius:10px; text-align:center; width:90%; max-width:400px; }
.lock-box h3 { color:#dc3545; }
.lock-box input { width:100%; padding:12px; margin:10px 0; box-sizing:border-box; font-size:18px; text-align:center; letter-spacing:2px; }
</style>
</head>
<body>

<!-- LAYAR KUNCI LISENSI -->
<div id="lockScreen" class="lock-screen" style="display:none;">
  <div class="lock-box">
    <h3>🔒 KASIR WARUNG MADURA PRO</h3>
    <p>Masukkan Kode Aktivasi dari Penjual</p>
    <input type="text" id="kodeInput" placeholder="MADURA-XXXX-XXXX" onkeypress="if(event.key==='Enter')cekKode()">
    <button class="btn-tambah" onclick="cekKode()">AKTIVASI</button>
    <p style="font-size:12px; color:red;" id="pesanError"></p>
    <p style="font-size:12px;">Hubungi: 0812-xxxx-xxxx</p>
  </div>
</div>

<div class="box" id="mainApp" style="display:none;">
  <button id="installBtn" class="install-btn">📲 INSTALL APLIKASI FULL LAYAR</button>
  <h2>🛒 KASIR WARUNG MADURA PRO</h2>

  <div class="form-input">
    <label>Nama Barang</label>
    <input type="text" id="namaBarang" placeholder="Contoh: Rokok, Kopi, Gula">
    <label>Qty</label>
    <input type="number" id="qtyBarang" placeholder="Contoh: 2" value="1">
    <label>Harga Satuan Rp</label>
    <input type="number" id="hargaBarang" placeholder="Contoh: 25000">
    <button class="btn-tambah" onclick="tambahBarang()">+ TAMBAHKAN KE KERANJANG</button>
  </div>

  <table id="tabel"><tr><th>No</th><th>Barang</th><th>Qty</th><th>Harga</th><th>Jumlah</th><th></th></tr></table>

  <div class="total-box">
    <h3>TOTAL BELANJA</h3>
    <div class="total">Rp <span id="total">0</span></div>
    <label style="font-weight:bold;">Uang Bayar</label>
    <div class="bayar-box"><input type="number" id="uangBayar" placeholder="Masukkan uang bayar" oninput="hitungKembalian()"></div>
    <div>Kembalian: <span class="kembalian">Rp <span id="kembalian">0</span></span></div>
    <button class="btn-tambah" style="background:#dc3545;" onclick="reset()">RESET TRANSAKSI BARU</button>
  </div>
</div>

<script>
// ===== DAFTAR KODE LISENSI =====
// BAPAK TAMBAH KODE DISINI. 1 KODE = 1 PEMBELI
const DAFTAR_KODE = [
  "MADURA-2026-001", // Kode buat Pembeli 1
  "MADURA-2026-002", // Kode buat Pembeli 2
  "DEMO-1234-ABCD" // Kode buat Demo
];
// =================================

let data = JSON.parse(localStorage.getItem('kasirMaduraLisensi')) || [];

// CEK APAKAH SUDAH AKTIF
function cekAktivasi(){
  let status = localStorage.getItem('lisensiAktif');
  if(status === 'true'){
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    tampilkan();
  } else {
    document.getElementById('lockScreen').style.display = 'flex';
  }
}

function cekKode(){
  let kode = document.getElementById('kodeInput').value.toUpperCase().trim();
  if(DAFTAR_KODE.includes(kode)){
    localStorage.setItem('lisensiAktif', 'true');
    localStorage.setItem('kodeDipakai', kode);
    cekAktivasi();
  } else {
    document.getElementById('pesanError').innerText = 'Kode Salah! Hubungi Penjual';
  }
}

function tambahBarang(){ let nama = document.getElementById('namaBarang').value; let qty = parseInt(document.getElementById('qtyBarang').value) || 1; let harga = parseInt(document.getElementById('hargaBarang').value); if(!nama ||!harga){ alert('Isi Nama dan Harga dulu'); return; } let jumlah = qty * harga; data.push({nama: nama, qty: qty, harga: harga, jumlah: jumlah}); localStorage.setItem('kasirMaduraLisensi', JSON.stringify(data)); document.getElementById('namaBarang').value = ''; document.getElementById('qtyBarang').value = '1'; document.getElementById('hargaBarang').value = ''; document.getElementById('namaBarang').focus(); tampilkan(); }
function hapus(index){ data.splice(index, 1); localStorage.setItem('kasirMaduraLisensi', JSON.stringify(data)); tampilkan(); }
function tampilkan(){ let tabel = document.getElementById('tabel'); let total = 0; tabel.innerHTML = '<tr><th>No</th><th>Barang</th><th>Qty</th><th>Harga</th><th>Jumlah</th><th></th></tr>'; data.forEach((d, i) => { total += d.jumlah; tabel.innerHTML += `<tr><td>${i+1}</td><td>${d.nama}</td><td>${d.qty}</td><td>Rp ${d.harga.toLocaleString('id-ID')}</td><td>Rp ${d.jumlah.toLocaleString('id-ID')}</td><td><button class="btn-hapus" onclick="hapus(${i})">X</button></td></tr>`; }); document.getElementById('total').innerText = total.toLocaleString('id-ID'); hitungKembalian(); }
function hitungKembalian(){ let total = data.reduce((sum, d) => sum + d.jumlah, 0); let bayar = parseInt(document.getElementById('uangBayar').value) || 0; document.getElementById('kembalian').innerText = (bayar - total).toLocaleString('id-ID'); }
function reset(){ if(confirm('Mulai transaksi baru?')){ data = []; localStorage.removeItem('kasirMaduraLisensi'); document.getElementById('uangBayar').value = ''; tampilkan(); } }
document.getElementById('hargaBarang').addEventListener('keypress', function(e){ if(e.key === 'Enter') tambahBarang(); });

// JALANKAN PERTAMA KALI
cekAktivasi();

// ===== PWA =====
const manifest = {"name": "Kasir Warung Madura PRO","short_name": "Kasir Madura","start_url": "./pwa2.html","display": "standalone","orientation": "portrait","background_color": "#ffffff","theme_color": "#dc3545","icons": [{"src": "https://placehold.co/192x192/dc3545/ffffff?text=KM", "sizes": "192x192", "type": "image/png"}]};
const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
document.querySelector('link[rel="manifest"]').setAttribute('href', URL.createObjectURL(manifestBlob));
const swCode = `self.addEventListener('install', e => e.waitUntil(self.skipWaiting())); self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));`;
if ('serviceWorker' in navigator) { navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], {type: 'text/javascript'}))); }
let deferredPrompt; const installBtn = document.getElementById('installBtn'); window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block'; }); installBtn.addEventListener('click', async () => { deferredPrompt.prompt(); await deferredPrompt.userChoice; installBtn.style.display = 'none'; });
</script>

</body>
</html>
